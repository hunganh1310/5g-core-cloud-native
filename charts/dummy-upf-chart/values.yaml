replicaCount: 2

image:
  repository: dummy-upf
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: dummy-upf
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

multus:
  enabled: true
  networks:
    - lab4-dataplane

podAnnotations: {}

podLabels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext:
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    add:
      - NET_RAW

nodeSelector: {}

tolerations: []

affinity: {}

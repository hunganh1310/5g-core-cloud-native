apiVersion: v1
kind: Service
metadata:
  name: {{ include "dummy-upf-chart.fullname" . }}
  labels:
    {{- include "dummy-upf-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "dummy-upf-chart.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
